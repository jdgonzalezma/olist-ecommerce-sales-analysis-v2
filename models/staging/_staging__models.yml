version: 2

models:
  - name: stg_customers
    description: "Clientes únicos de Olist mapeados por customer_id."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_orders
    description: "Órdenes de compra y su estado en el ciclo de vida."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              values: ['delivered', 'shipped', 'canceled', 'invoiced', 'processing', 'approved', 'unavailable', 'created']

  - name: stg_order_items
    description: "Detalle de ítems por orden de compra."
    columns:
      - name: order_id
        tests:
          - not_null
      - name: order_item_id
        tests:
          - not_null
      - name: product_id
        tests:
          - not_null
      - name: seller_id
        tests:
          - not_null

  - name: stg_products
    description: "Catálogo de productos con dimensiones y pesos."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: stg_sellers
    description: "Vendedores registrados en la plataforma."
    columns:
      - name: seller_id
        tests:
          - unique
          - not_null

  - name: stg_geolocation
    description: "Coordenadas promediadas por prefijo de código postal."
    columns:
      - name: geolocation_zip_code_prefix
        tests:
          - unique
          - not_null

  - name: stg_order_payments
    description: "Métodos y desglose de pagos por orden."
    columns:
      - name: order_id
        tests:
          - not_null

  - name: stg_order_reviews
    description: "Reseñas y puntuaciones asignadas por los clientes."
    columns:
      - name: review_id
        tests:
          - not_null
      - name: order_id
        tests:
          - not_null